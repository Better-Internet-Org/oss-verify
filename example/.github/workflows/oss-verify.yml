# SPDX-License-Identifier: MIT
name: oss-verified

# Re-attest on every push to the default branch.
# `paths-ignore: .oss-verified/**` prevents the bundle-commit triggering
# its own re-run loop.
on:
  push:
    branches: [main]
    paths-ignore:
      - ".oss-verified/**"

permissions:
  contents: write   # commit + push the attestation bundle back
  id-token: write   # OIDC for Sigstore keyless signing

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: better-internet-org/oss-verify@main
        with:
          # Required. SPEC §4 makes the LLM audit step mandatory — the CLI
          # exits 1 if ANTHROPIC_API_KEY is missing. Set as a repo secret:
          # Settings → Secrets and variables → Actions → New repository secret.
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
