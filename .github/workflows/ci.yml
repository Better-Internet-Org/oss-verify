# SPDX-License-Identifier: MIT
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@10 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  smoke-self-test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    # SPEC §4 makes the LLM audit step mandatory — the CLI exits 1 without
    # ANTHROPIC_API_KEY. Skip the smoke job on forks / PRs from contributors
    # who don't have the secret. Main-branch pushes (where the secret is
    # configured) still exercise the full path.
    if: ${{ vars.ANTHROPIC_KEY_AVAILABLE == 'true' || github.event_name == 'push' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@10 --activate
      - run: pnpm install --frozen-lockfile
      - name: Run CLI on example fixture
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        working-directory: example
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Fresh git history so the CLI's git-derived metadata works.
          git init -q
          git config user.email t@test
          git config user.name t
          git add . && git commit -qm init
          git remote add origin https://github.com/example/example.git
          npx -y tsx ../src/cli.ts --output predicate | head -c 2000
      - name: Note skipped smoke test
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: echo "ANTHROPIC_API_KEY not set on this repo — smoke test skipped. Set it as a repo secret to enable."
