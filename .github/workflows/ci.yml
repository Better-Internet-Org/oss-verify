# SPDX-License-Identifier: MIT
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@10 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  smoke-self-test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@10 --activate
      - run: pnpm install --frozen-lockfile
      # Run the CLI against the bundled `example/` fixture, no LLM call.
      # Doesn't sign — just confirms all 4 deterministic checks pass and a
      # predicate is emitted.
      - name: Run CLI on example fixture
        working-directory: example
        run: |
          # Fresh git history so cli's git-derived metadata works.
          git init -q
          git config user.email t@test
          git config user.name t
          git add . && git commit -qm init
          git remote add origin https://github.com/example/example.git
          npx -y tsx ../src/cli.ts --allow-llm-skip --output predicate \
            | head -c 2000
