# SPDX-License-Identifier: MIT
name: adversarial

# SPEC §7.4 exit-criterion check. Runs the corpus in test-corpus/ via
# tools/adversarial-test.mjs. Path-filter trims to runs that actually
# affect the LLM behaviour. When ANTHROPIC_API_KEY isn't configured on
# this repo, the corpus run is no-op'd inside the step so the workflow
# still passes structurally.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/checks/llm-audit.ts"
      - "spec/models.json"
      - "test-corpus/**"
      - "tools/adversarial-test.mjs"
      - ".github/workflows/adversarial.yml"

permissions:
  contents: read

jobs:
  adversarial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@10 --activate
      - run: pnpm install --frozen-lockfile
      # adversarial-test.mjs invokes dist/cli.mjs (Node 22's strip-types
      # doesn't remap .js imports to .ts for transitive imports, so source-
      # mode fails with ERR_MODULE_NOT_FOUND). Build first.
      - run: pnpm build
      - name: Run adversarial corpus
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::notice::ANTHROPIC_API_KEY not configured on this repo — skipping corpus run."
            echo "::notice::Set the secret in repo settings, then re-run this workflow via workflow_dispatch."
            exit 0
          fi
          node --experimental-strip-types tools/adversarial-test.mjs
