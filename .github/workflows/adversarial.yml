# SPDX-License-Identifier: MIT
name: adversarial

# SPEC §7.4 exit-criterion check. Runs the corpus in test-corpus/ via
# tools/adversarial-test.mjs. Skipped on PRs from forks (no API key) and
# on pushes that don't touch the prompt, models.json, or the corpus —
# saves API credits on doc-only changes.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/checks/llm-audit.ts"
      - "spec/models.json"
      - "test-corpus/**"
      - "tools/adversarial-test.mjs"
      - ".github/workflows/adversarial.yml"

permissions:
  contents: read

jobs:
  adversarial:
    if: ${{ secrets.ANTHROPIC_API_KEY != '' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && corepack prepare pnpm@10 --activate
      - run: pnpm install --frozen-lockfile
      - name: Run adversarial corpus
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node --experimental-strip-types tools/adversarial-test.mjs
