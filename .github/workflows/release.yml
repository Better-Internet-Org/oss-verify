# SPDX-License-Identifier: MIT
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create the release + upload assets
  id-token: write   # npm publish provenance via Sigstore
  packages: write   # publish container image to ghcr.io

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - run: corepack enable && corepack prepare pnpm@10 --activate

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - name: Build npm-distributable
        run: pnpm build

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build standalone binaries
        run: pnpm build:binaries

      - name: Compute checksums
        run: |
          cd dist/binaries
          sha256sum * > SHA256SUMS

      - name: Publish to npm via OIDC trusted publisher
        # No NODE_AUTH_TOKEN. npm CLI exchanges this job's id-token (the
        # `id-token: write` permission above) for a short-lived publish
        # credential, matching the pre-registered trusted publisher on
        # npmjs.com (package + repo owner + repo name + workflow filename).
        # Provenance is automatic in OIDC mode but we still pass --provenance
        # for clarity; the Sigstore-attested record links the published
        # tarball to this exact workflow run.
        run: pnpm publish --no-git-checks --access public --provenance

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/oss-verify:latest
            ghcr.io/${{ github.repository_owner }}/oss-verify:${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/binaries/*
