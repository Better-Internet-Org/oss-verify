# SPDX-License-Identifier: MIT
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create the release + upload assets
  id-token: write   # npm publish provenance via Sigstore
  packages: write   # publish container image to ghcr.io

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - run: corepack enable && corepack prepare pnpm@10 --activate

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - name: Build npm-distributable
        run: pnpm build

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build standalone binaries
        run: pnpm build:binaries

      - name: Compute checksums
        run: |
          cd dist/binaries
          sha256sum * > SHA256SUMS

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN not set — skipping npm publish."
            exit 0
          fi
          # Provenance writes a Sigstore attestation into Rekor that binds
          # the tarball to this exact workflow run + commit — supply-chain
          # integrity holds even though we're using a long-lived token for
          # the publish handshake itself.
          pnpm publish --no-git-checks --access public --provenance

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker registry names must be lowercase; the org is "Better-Internet-Org"
      # so the raw github.repository_owner can't be used as a tag directly.
      - name: Lowercase owner for registry tag
        id: img
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build + push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ steps.img.outputs.owner }}/oss-verify:latest
            ghcr.io/${{ steps.img.outputs.owner }}/oss-verify:${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/binaries/*
